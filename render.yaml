services:
  - type: web
    name: samsonllc-backend
    runtime: python
    plan: free
    buildCommand: ./build.sh
    startCommand: ./start.sh
    envVars:
      - key: PYTHON_VERSION
        value: "3.10.13"
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: FRONTEND_URL
        value: https://eliteforge.netlify.app
      - key: ALLOWED_HOSTS
        value: localhost,127.0.0.1,.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: samsonllc-db
          property: connectionString

databases:
  - name: samsonllc-db
    plan: free
    databaseName: samsonllc
    user: samsonllc
